# 덕션 Stage 0 스택 — ARCHITECTURE.md §4
# 로컬 개발:  docker compose up -d postgres  →  npm run dev
# 전체 스택:  docker compose up --build      →  http://localhost:3100

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: duction
      POSTGRES_PASSWORD: duction
      POSTGRES_DB: duction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duction -d duction"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m

  # Stage 1부터 소비 (BullMQ 큐·rate limit). Redis가 죽어도 입찰·결제는 동작해야 한다 — §5-3
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    mem_limit: 128m

  # 일회성 마이그레이션 잡 — 앱 기동과 스키마 변경을 분리 (§4)
  # builder 타깃 사용: prisma CLI가 필요 (runner는 최소 런타임)
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://duction:duction@postgres:5432/duction
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build: .
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://duction:duction@postgres:5432/duction
      NEXT_PUBLIC_SITE_URL: http://localhost:3100
      REDIS_URL: redis://redis:6379
      # 웹푸시 — 프로젝트 .env에서 자동 보간 (없으면 푸시 비활성)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 768m

  # 같은 이미지, 다른 진입점 — 정산·미결제·승계 루프 (§3)
  worker:
    build: .
    command: node worker.js
    environment:
      DATABASE_URL: postgresql://duction:duction@postgres:5432/duction
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m

volumes:
  pgdata:
